  <meta charset="UTF-8" />

  <title>Kolo Osudu</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="wrap">
  <div class="stars" id="stars"></div>

  <div class="container">

    <!-- Header -->

      <div class="subtitle">✦ Tvoje slovo na dnešní den ✦</div>

    <div class="wheel-area">
      <div class="pointer"></div>
      <div class="wheel-wrapper">
        <div class="glow-ring"></div>
        <div class="glow-bg"></div>
        <canvas id="wheel" width="320" height="320"></canvas>
        <div class="hub" id="hub">🌟</div>
      </div>
    </div>

    <!-- Spin button -->
    <button class="spin-btn" id="spinBtn">✦ Točit kolem ✦</button>

    <!-- Fortune card -->
    <div class="fortune-card" id="fortuneCard">
      <div class="f-cat"  id="fCat"></div>
      <span class="f-emoji" id="fEmoji"></span>
      <img class="f-img" id="fImg" src="" alt="Zlatý bludišťák" />
      <div class="f-title" id="fTitle"></div>
      <div class="f-text"  id="fText"></div>
    </div>

    <p class="instruction">Klepni na kolo nebo tlačítko</p>

  </div><!-- /.container -->
</div><!-- /.wrap -->

    'top:'    + (Math.random() * 100) + '%;' +
    'left:'   + (Math.random() * 100) + '%;' +
    '--d:'    + (Math.random() * 3 + 1.5).toFixed(1) + 's';

/* ── Shuffle (no repeats until pool exhausted) ── */
const shown = {};
segments.forEach(s => { shown[s.label] = []; });

function getNext(label) {
  const pool  = fortunes[label];
  const seen  = shown[label];
  let avail   = pool.map((_, i) => i).filter(i => !seen.includes(i));
  if (!avail.length) { shown[label] = []; avail = pool.map((_, i) => i); }
  const idx = avail[Math.floor(Math.random() * avail.length)];
  shown[label].push(idx);
  return pool[idx];
}

/* ── Canvas wheel ── */
const canvas  = document.getElementById('wheel');
const ctx     = canvas.getContext('2d');
const SIZE    = 320, CX = 160, CY = 160, R = 158;
const SEG     = (Math.PI * 2) / segments.length;
let angle     = 0;
let spinning  = false;

function draw(a) {
  ctx.clearRect(0, 0, SIZE, SIZE);

  segments.forEach((seg, i) => {
    const s = a + i * SEG;
    const e = s + SEG;
    const m = s + SEG / 2;

    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, R, s, e);
    ctx.closePath();
    ctx.fillStyle = seg.color;
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, R, s, e);
    ctx.closePath();
    ctx.strokeStyle = 'rgba(201,162,39,0.25)';
    ctx.lineWidth   = 1.5;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(CX, CY, R - 8, s + 0.06, e - 0.06);
    ctx.strokeStyle = seg.accent;
    ctx.lineWidth   = 4;
    ctx.globalAlpha = 0.7;
    ctx.stroke();
    ctx.globalAlpha = 1;

    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(m);
    ctx.textAlign   = 'right';
    ctx.font        = 'bold 11px Arial,sans-serif';
    ctx.fillStyle   = '#fff';
    ctx.shadowColor = seg.accent;
    ctx.shadowBlur  = 8;
    ctx.fillText(seg.label, R - 16, 4);
    ctx.restore();
  });

  const g = ctx.createRadialGradient(CX, CY, 22, CX, CY, 58);
  g.addColorStop(0, 'rgba(13,14,26,0.9)');
  g.addColorStop(1, 'rgba(13,14,26,0)');
  ctx.beginPath();
  ctx.arc(CX, CY, 58, 0, Math.PI * 2);
  ctx.fillStyle = g;
  ctx.fill();
}

draw(angle);

/* ── Spin ── */
function spin() {
  if (spinning) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;

  const card = document.getElementById('fortuneCard');
  card.classList.remove('visible');
  card.style.display = 'none';

  const total = (Math.floor(Math.random() * 4) + 5) * Math.PI * 2 + Math.random() * Math.PI * 2;
  const dur   = 4000 + Math.random() * 1500;
  const t0    = performance.now();
  const a0    = angle;

  function frame(now) {
    const t    = Math.min((now - t0) / dur, 1);
    const ease = 1 - Math.pow(1 - t, 4);
    angle      = a0 + total * ease;
    draw(angle);
    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      spinning = false;
      document.getElementById('spinBtn').disabled = false;
      reveal(angle);
    }
  }
  requestAnimationFrame(frame);
}

/* ── Reveal ── */
function reveal(a) {
  const n   = (((-a - Math.PI / 2) % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
  const idx = Math.floor(n / SEG) % segments.length;
  const seg = segments[idx];
  const f   = getNext(seg.label);

  const card   = document.getElementById('fortuneCard');
  const imgEl  = document.getElementById('fImg');
  const emojiEl = document.getElementById('fEmoji');

  card.style.display     = 'block';
  card.style.borderColor = seg.accent + '80';

  document.getElementById('fCat').textContent  = seg.label;
  document.getElementById('fCat').style.color  = seg.accent;

  if (f.img) {
    emojiEl.textContent  = '';
    imgEl.src            = f.img;
    imgEl.style.display  = 'block';
  } else {
    emojiEl.textContent  = f.e;
    imgEl.style.display  = 'none';
    imgEl.src            = '';
  }

  document.getElementById('fTitle').textContent = f.t;
  document.getElementById('fText').textContent  = f.x;

  card.classList.add('visible');
}

/* ── Events ── */
canvas.addEventListener('click', spin);
canvas.addEventListener('touchend', e => { e.preventDefault(); spin(); }, { passive: false });
document.getElementById('hub').addEventListener('click', spin);
document.getElementById('hub').addEventListener('touchend', e => { e.preventDefault(); spin(); }, { passive: false });
document.getElementById('spinBtn').addEventListener('click', spin);
</script>
